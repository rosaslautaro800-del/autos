<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hot Wheels</title>

<style>
body{
  margin:0;
  background:#0a0a0a;
  color:white;
  font-family:Arial;
  text-align:center;
  overflow-x:hidden;
}

.container{
  max-width:1200px;
  margin:auto;
}

/* LOGO */
.logo img{
  width:300px;
  margin-top:30px;
  animation:spin 6s linear infinite;
  filter:drop-shadow(0 0 20px orange);
}

@keyframes spin{
  from{transform:rotate(0deg);}
  to{transform:rotate(360deg);}
}

/* AUTO ANIMADO */
.car{
  position:fixed;
  bottom:10px;
  left:-250px;
  width:180px;
  z-index:9999;
  pointer-events:none;
  animation:drive 6s linear infinite;
}

/* si no ves el auto, probablemente falta la imagen car.png */

@keyframes drive{
  0%{left:-250px; transform:scaleX(1);} 
  49%{transform:scaleX(1);} 
  50%{left:110%; transform:scaleX(-1);} 
  100%{left:-250px; transform:scaleX(-1);} 
}
  100%{left:110%;}
}

/* TITULOS */
h2{
  color:#ffae00;
  margin-top:50px;
  text-shadow:0 0 10px orange;
}

.section{
  padding:40px;
}

.grid{
  display:flex;
  justify-content:center;
  gap:20px;
  flex-wrap:wrap;
}

img{
  max-width:100%;
  height:auto;
}

.grid img{
  width:250px;
  border-radius:15px;
  transition:0.3s;
  box-shadow:0 0 15px rgba(255,100,0,0.5);
}

/* HOVER PRO */
.grid img:hover{
  transform:scale(1.1) rotate(2deg);
  box-shadow:0 0 30px orange;
}

iframe{
  width:80%;
  height:400px;
  border-radius:15px;
  box-shadow:0 0 20px orange;
}

.card{
  background:#111;
  padding:15px;
  border-radius:15px;
  border:1px solid orange;
  transition:0.3s;
  width:250px;
}

.card img{
  width:100%;
  height:200px;
  object-fit:cover;
  border-radius:10px;
}

.card:hover{
  transform:scale(1.08);
  box-shadow:0 0 25px orange;
}

/* LINEA FUEGO */
.line{
  height:5px;
  background:linear-gradient(90deg,transparent,orange,transparent);
  margin:40px 0;
  box-shadow:0 0 15px orange;
  animation:glow 2s infinite alternate;
}

@keyframes glow{
  from{box-shadow:0 0 5px orange;}
  to{box-shadow:0 0 20px orange;}
}

footer{
  padding:20px;
  color:#aaa;
}


/* FONDO TIPO PISTA */
body::after{
  content:"";
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  height:80px;
  background:repeating-linear-gradient(
    90deg,
    #111 0px,
    #111 40px,
    #222 40px,
    #222 80px
  );
  z-index:-1;
}

/* EFECTO FUEGO DETRAS DEL AUTO */
.car::after{
  content:"";
  position:absolute;
  left:-40px;
  top:50%;
  width:60px;
  height:10px;
  background:linear-gradient(90deg, orange, red, transparent);
  filter:blur(6px);
}

</style>

</head>
<body>

<!-- AUTO ANIMADO -->
<img src="carrito.png" class="car">

<div class="container">

<div class="logo">
  <img src="logo.png">
</div>

<div class="line"></div>

<div class="section">
  <h2>AUTOS HOT WHEELS</h2>
  <div class="grid">
    <img src="img1.jpg">
    <img src="img2.jpeg">
    <img src="img3.jpeg">
  </div>
</div>

<div class="line"></div>

<div class="section">
  <h2>VIDEO</h2>
  <iframe src="https://www.youtube.com/embed/0u3b7DAmQZI" allowfullscreen></iframe>
</div>

<div class="line"></div>

<div class="section">
  <h2>AUTOS RAROS / COLECCIONABLES</h2>
  <div class="grid">
    <div class="card">
      <img src="mit.jpg">
      <p>Mitsubishi Eclipse</p>
    </div>
    <div class="card">
      <img src="scooby.jpg">
      <p>Van de Scooby Doo</p>
    </div>
    <div class="card">
      <img src="spiderman.jpg">
      <p>Modelo raro</p>
    </div>
  </div>
</div>

<div class="line"></div>

<div class="section">
  <h2>HISTORIA DE HOT WHEELS</h2>
  <p>Hot Wheels nació en 1968 por Mattel revolucionando los autos de juguete con velocidad y diseño.</p>
</div>

<div class="line"></div>

<div class="section">
  <h2>ESCALAS</h2>
  <div class="grid">
    <div class="card">
      <img src="164.jpg">
      <p>1:64</p>
    </div>
    <div class="card">
      <img src="ferrari.jpg">
      <p>1:43</p>
    </div>
    <div class="card">
      <img src="118.jpg">
      <p>1:18</p>
    </div>
  </div>
</div>

<div class="line"></div>

<footer>
  <p>Proyecto fan de Hot Wheels</p>
</footer>

</div>

</body>
</html>
